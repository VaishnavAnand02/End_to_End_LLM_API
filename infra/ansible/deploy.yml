---
- name: Deploy MLOps Endpoint (Phase 4 - Pull & Run)
  hosts: ml_servers
  become: yes 

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name: [ca-certificates, curl, gnupg]
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable"
        state: present

    - name: Install Docker and Docker Compose
      apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-buildx-plugin, docker-compose-plugin]
        state: present

    - name: Ensure Docker service is running
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Create app directory structure
      file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
      loop:
        - /home/ubuntu/gguf_endpoint
        - /home/ubuntu/gguf_endpoint/model

    # We ONLY copy the docker-compose.yml file now. Everything else is inside the Docker image!
    - name: Copy docker-compose.yml to server
      copy:
        src: ../../docker-compose.yml 
        dest: /home/ubuntu/gguf_endpoint/docker-compose.yml
        owner: ubuntu
        group: ubuntu

    # We keep the model download here so we don't have to push a 5GB Docker image to Docker Hub
    - name: Check if GGUF model already exists on the server
      stat:
        path: /home/ubuntu/gguf_endpoint/model/llama.gguf
      register: model_file

    - name: Download GGUF model directly to the EC2 instance
      get_url:
        url: "https://huggingface.co/bartowski/Meta-Llama-3.1-8B-Instruct-GGUF/resolve/main/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf" 
        dest: /home/ubuntu/gguf_endpoint/model/llama.gguf
        mode: '0644'
      when: not model_file.stat.exists 

    # THE MAGIC OF PHASE 4: Just pull and run! Takes 10 seconds and uses almost zero RAM.
    - name: Pull the pre-built Docker image from Docker Hub
      command: docker compose pull
      args:
        chdir: /home/ubuntu/gguf_endpoint

    - name: Start the API container
      command: docker compose up -d
      args:
        chdir: /home/ubuntu/gguf_endpoint