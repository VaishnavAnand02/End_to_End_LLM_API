---
- name: Configure MLOps Endpoint
  hosts: ml_servers
  become: yes # Run as sudo/root

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install required packages (Docker dependencies)
      apt:
        name: 
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable"
        state: present

    - name: Install Docker and Docker Compose
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Ensure Docker service is running
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Create app directory structure
      file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
      loop:
        - /home/ubuntu/gguf_endpoint
        - /home/ubuntu/gguf_endpoint/model

        # ADD THIS NEW TASK FIRST
    - name: Clean old app directories to prevent nested src/src inception
      file:
        path: /home/ubuntu/gguf_endpoint/{{ item }}
        state: absent
      loop:
        - src
        - settings

    - name: Copy application files to server
      copy:
        src: ../../{{ item }} # Assumes you run ansible from the 'ansible' directory
        dest: /home/ubuntu/gguf_endpoint/{{ item }}
        owner: ubuntu
        group: ubuntu
      loop:
        - src
        - settings
        - requirements.txt
        - Dockerfile
        - docker-compose.yml

    - name: Check if GGUF model already exists on the server
      stat:
        path: /home/ubuntu/gguf_endpoint/model/llama.gguf
      register: model_file

    - name: Download GGUF model directly to the EC2 instance
      get_url:
        url: "https://huggingface.co/bartowski/Meta-Llama-3.1-8B-Instruct-GGUF/resolve/main/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf" 
        dest: /home/ubuntu/gguf_endpoint/model/llama.gguf
        mode: '0644'
      when: not model_file.stat.exists # This acts as a strict "Skip" button

    - name: Build and start the Docker container
      command: docker compose up --build -d
      args:
        chdir: /home/ubuntu/gguf_endpoint


